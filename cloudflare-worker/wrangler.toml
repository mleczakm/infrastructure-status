name = "uptime-dispatcher"
main = "src/index.ts"
compatibility_date = "2024-06-01"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[env.production]
vars = { GH_OWNER = "mleczakm", GH_REPO = "infrastructure-status" }

# Optional: Configure these secrets in Cloudflare for alerting
# SLACK_WEBHOOK_URL = will use NOTIFICATION_DISCORD_WEBHOOK_URL + "/slack" in the worker code

[env.production.triggers]
crons = ["*/5 * * * *"]
